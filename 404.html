<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="6; url=./index.html">
  <title>Page Not Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page-shell">
    <main class="section not-found-page">
      <article class="contact-card not-found-card is-visible">
        <div>
          <p class="section-kicker">404</p>
          <h2>这个页面不存在，或者访问地址不对。</h2>
          <p class="supporting-text">
            当前仓库是 GitHub Pages 项目页，通常应从项目主页地址进入，而不是直接打开一个不匹配的 `github.io` 根域名。
            页面将在几秒后自动返回首页。
          </p>
        </div>
        <div class="contact-actions">
          <a class="button primary" href="./index.html">返回中文首页</a>
          <a class="button secondary" href="./en.html">Go to English Page</a>
        </div>
      </article>
    </main>
  </div>
</body>
</html>
